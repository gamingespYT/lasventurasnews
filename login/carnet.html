<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generar Carnet | Las Venturas News</title>
    <meta name="description" content="Generador de carnets de empleado de Las Venturas News.">
    <link rel="icon" href="../img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="login-bg min-h-screen flex flex-col">

        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <!-- Header -->
        <header class="w-full border-b border-white/10 backdrop-blur-md bg-white/5 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
                <a href="dashboard.html" class="text-xl md:text-2xl font-bold tracking-tighter" style="font-family: 'Oswald', sans-serif;">
                    <span class="text-white">LAS VENTURAS </span><span class="text-red-500">NEWS</span>
                </a>
                <div class="flex items-center gap-4">
                    <a href="dashboard.html" class="text-slate-400 hover:text-white text-sm transition flex items-center gap-1.5" style="font-family: 'Inter', sans-serif;">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12"/>
                        </svg>
                        Panel
                    </a>
                    <button id="btn-logout" class="text-red-400 hover:text-red-300 text-sm transition flex items-center gap-1.5 cursor-pointer" style="font-family: 'Inter', sans-serif;">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Cerrar sesión
                    </button>
                </div>
            </div>
        </header>

        <!-- Contenido principal -->
        <main class="flex-1 w-full max-w-4xl mx-auto px-4 py-10 md:py-14">

            <div class="fade-in mb-8">
                <h1 class="text-2xl md:text-3xl font-bold text-white mb-2" style="font-family: 'Oswald', sans-serif;">
                    GENERAR CARNET DE EMPLEADO
                </h1>
                <p class="text-slate-500 text-sm" style="font-family: 'Inter', sans-serif;">
                    Completa los datos para generar un carnet de prensa temporal.
                </p>
                <div class="red-line mt-4" style="margin: 1rem 0 0 0;"></div>
            </div>

            <!-- Formulario -->
            <form id="carnet-form" class="fade-in-delay space-y-6">

                <!-- Datos personales -->
                <div class="login-card p-6 md:p-8">
                    <h2 class="text-white font-semibold text-sm uppercase tracking-wider mb-5 flex items-center gap-2" style="font-family: 'Oswald', sans-serif;">
                        <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        Datos del empleado
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-400 text-xs font-medium mb-2 uppercase tracking-wider" style="font-family: 'Inter', sans-serif;">Nombre</label>
                            <input type="text" id="emp-nombre" class="login-input" style="padding-left: 1rem;" placeholder="Nombre" required>
                        </div>
                        <div>
                            <label class="block text-slate-400 text-xs font-medium mb-2 uppercase tracking-wider" style="font-family: 'Inter', sans-serif;">Apellido</label>
                            <input type="text" id="emp-apellido" class="login-input" style="padding-left: 1rem;" placeholder="Apellido" required>
                        </div>
                        <div>
                            <label class="block text-slate-400 text-xs font-medium mb-2 uppercase tracking-wider" style="font-family: 'Inter', sans-serif;">Número de empleado</label>
                            <input type="text" id="emp-numero" class="login-input" style="padding-left: 1rem;" placeholder="Ej: 001" required>
                        </div>
                        <div>
                            <label class="block text-slate-400 text-xs font-medium mb-2 uppercase tracking-wider" style="font-family: 'Inter', sans-serif;">Cargo / Puesto</label>
                            <input type="text" id="emp-cargo" class="login-input" style="padding-left: 1rem;" placeholder="Ej: Periodista" required>
                        </div>
                        <div>
                            <label class="block text-slate-400 text-xs font-medium mb-2 uppercase tracking-wider" style="font-family: 'Inter', sans-serif;">Fecha de nacimiento</label>
                            <input type="date" id="emp-nacimiento" class="login-input" style="padding-left: 1rem;" required>
                        </div>
                    </div>
                </div>

                <!-- Foto -->
                <div class="login-card p-6 md:p-8">
                    <h2 class="text-white font-semibold text-sm uppercase tracking-wider mb-5 flex items-center gap-2" style="font-family: 'Oswald', sans-serif;">
                        <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        Fotografía
                    </h2>
                    <div class="flex flex-col sm:flex-row items-start gap-5">
                        <div class="foto-preview-container" id="foto-preview-container">
                            <div class="foto-placeholder" id="foto-placeholder">
                                <svg class="w-8 h-8 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                </svg>
                                <span class="text-slate-600 text-xs mt-1" style="font-family: 'Inter', sans-serif;">Sin foto</span>
                            </div>
                            <img id="foto-preview-img" class="foto-preview-img hidden" alt="Vista previa">
                        </div>
                        <div class="flex-1 w-full">
                            <label for="emp-foto" class="file-upload-area" id="file-upload-area">
                                <svg class="w-6 h-6 text-slate-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                                </svg>
                                <span class="text-slate-400 text-sm" style="font-family: 'Inter', sans-serif;">Haz clic o arrastra una imagen</span>
                                <span class="text-slate-600 text-xs mt-1" style="font-family: 'Inter', sans-serif;">PNG, JPG o WebP</span>
                                <input type="file" id="emp-foto" accept="image/png,image/jpeg,image/webp" class="hidden" required>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Fechas -->
                <div class="login-card p-6 md:p-8">
                    <h2 class="text-white font-semibold text-sm uppercase tracking-wider mb-5 flex items-center gap-2" style="font-family: 'Oswald', sans-serif;">
                        <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        Validez del carnet
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-400 text-xs font-medium mb-2 uppercase tracking-wider" style="font-family: 'Inter', sans-serif;">Fecha de expedición</label>
                            <input type="date" id="emp-expedicion" class="login-input" style="padding-left: 1rem;" required>
                        </div>
                        <div>
                            <label class="block text-slate-400 text-xs font-medium mb-2 uppercase tracking-wider" style="font-family: 'Inter', sans-serif;">Fecha de expiración</label>
                            <input type="date" id="emp-expiracion" class="login-input" style="padding-left: 1rem;" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    <span id="btn-text">GENERAR CARNET</span>
                </button>
            </form>

            <!-- Vista previa del carnet -->
            <div id="carnet-result" class="hidden fade-in mt-10">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold text-white" style="font-family: 'Oswald', sans-serif;">
                        VISTA PREVIA
                    </h2>
                    <div class="flex gap-3">
                        <button id="btn-new" class="text-slate-400 hover:text-white text-sm transition flex items-center gap-1.5 cursor-pointer" style="font-family: 'Inter', sans-serif;">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                            Nuevo carnet
                        </button>
                    </div>
                </div>

                <div class="carnet-canvas-wrapper">
                    <canvas id="carnet-canvas"></canvas>
                </div>

                <button id="btn-download" class="login-btn mt-6" style="background: linear-gradient(135deg, #059669 0%, #047857 100%);">
                    <svg class="w-5 h-5 inline-block mr-2 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    DESCARGAR PNG
                </button>
            </div>

        </main>
    </div>

    <script src="auth.js?v=1.0"></script>
    <script>
        Auth.protegerPagina();

        // ── Elementos del DOM ──
        const form = document.getElementById('carnet-form');
        const carnetResult = document.getElementById('carnet-result');
        const canvas = document.getElementById('carnet-canvas');
        const ctx = canvas.getContext('2d');
        const btnDownload = document.getElementById('btn-download');
        const btnNew = document.getElementById('btn-new');
        const fotoInput = document.getElementById('emp-foto');
        const fotoPreviewImg = document.getElementById('foto-preview-img');
        const fotoPlaceholder = document.getElementById('foto-placeholder');
        const fileUploadArea = document.getElementById('file-upload-area');

        // ── Fechas por defecto ──
        const today = new Date();
        const nextYear = new Date(today);
        nextYear.setFullYear(nextYear.getFullYear() + 1);

        document.getElementById('emp-expedicion').value = formatDateInput(today);
        document.getElementById('emp-expiracion').value = formatDateInput(nextYear);

        function formatDateInput(d) {
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function formatDateDisplay(dateStr) {
            const parts = dateStr.split('-');
            return parts[2] + '/' + parts[1] + '/' + parts[0];
        }

        // ── Previsualización de foto ──
        let uploadedPhoto = null;

        fotoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                uploadedPhoto = new Image();
                uploadedPhoto.onload = () => {
                    fotoPreviewImg.src = ev.target.result;
                    fotoPreviewImg.classList.remove('hidden');
                    fotoPlaceholder.classList.add('hidden');
                    fileUploadArea.innerHTML = `
                        <svg class="w-5 h-5 text-green-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                        <span class="text-green-400 text-sm" style="font-family: 'Inter', sans-serif;">${file.name}</span>
                        <span class="text-slate-500 text-xs mt-1" style="font-family: 'Inter', sans-serif;">Clic para cambiar</span>
                        <input type="file" id="emp-foto" accept="image/png,image/jpeg,image/webp" class="hidden">
                    `;
                    // Re-attach eventos
                    const newInput = fileUploadArea.querySelector('input[type="file"]');
                    newInput.addEventListener('change', fotoInput.onchange);
                    // Replace reference
                    document.getElementById('emp-foto').addEventListener('change', handleFileChange);
                };
                uploadedPhoto.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        function handleFileChange(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                uploadedPhoto = new Image();
                uploadedPhoto.onload = () => {
                    fotoPreviewImg.src = ev.target.result;
                    fotoPreviewImg.classList.remove('hidden');
                    fotoPlaceholder.classList.add('hidden');
                };
                uploadedPhoto.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Drag & drop
        fileUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUploadArea.classList.add('drag-over');
        });
        fileUploadArea.addEventListener('dragleave', () => {
            fileUploadArea.classList.remove('drag-over');
        });
        fileUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUploadArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const dt = new DataTransfer();
                dt.items.add(file);
                fotoInput.files = dt.files;
                fotoInput.dispatchEvent(new Event('change'));
            }
        });

        // ── Logo preload ──
        const logoImg = new Image();
        logoImg.crossOrigin = 'anonymous';
        logoImg.src = '../img/logo.png';

        // ── Generar carnet ──
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            if (!uploadedPhoto) {
                alert('Por favor, sube una fotografía.');
                return;
            }

            const data = {
                nombre: document.getElementById('emp-nombre').value.trim(),
                apellido: document.getElementById('emp-apellido').value.trim(),
                numero: document.getElementById('emp-numero').value.trim(),
                cargo: document.getElementById('emp-cargo').value.trim(),
                nacimiento: document.getElementById('emp-nacimiento').value,
                expedicion: document.getElementById('emp-expedicion').value,
                expiracion: document.getElementById('emp-expiracion').value
            };

            drawCarnet(data);

            form.classList.add('hidden');
            carnetResult.classList.remove('hidden');
            carnetResult.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });

        // ── Nuevo carnet ──
        btnNew.addEventListener('click', () => {
            carnetResult.classList.add('hidden');
            form.classList.remove('hidden');
            form.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });

        // ── Descargar PNG ──
        btnDownload.addEventListener('click', () => {
            const nombre = document.getElementById('emp-nombre').value.trim();
            const apellido = document.getElementById('emp-apellido').value.trim();
            const link = document.createElement('a');
            link.download = `carnet_${nombre}_${apellido}.png`.replace(/\s+/g, '_');
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        // ── Dibujar carnet en Canvas ──
        function drawCarnet(data) {
            const W = 856;
            const H = 540;
            const R = 30; // border radius
            canvas.width = W;
            canvas.height = H;

            ctx.clearRect(0, 0, W, H);

            // ── Fondo con bordes redondeados ──
            ctx.save();
            roundedRect(ctx, 0, 0, W, H, R);
            ctx.clip();

            // Fondo principal — gradiente rojo oscuro
            const bgGrad = ctx.createLinearGradient(0, 0, W, H);
            bgGrad.addColorStop(0, '#7f1d1d');
            bgGrad.addColorStop(0.5, '#991b1b');
            bgGrad.addColorStop(1, '#7f1d1d');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, W, H);

            // Patrón de textura sutil (líneas diagonales)
            ctx.globalAlpha = 0.06;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            for (let i = -H; i < W + H; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i + H, H);
                ctx.stroke();
            }
            ctx.globalAlpha = 1;

            // ── Franja superior roja brillante ──
            const topBarH = 72;
            const topGrad = ctx.createLinearGradient(0, 0, W, 0);
            topGrad.addColorStop(0, '#dc2626');
            topGrad.addColorStop(0.5, '#ef4444');
            topGrad.addColorStop(1, '#dc2626');
            ctx.fillStyle = topGrad;
            ctx.fillRect(0, 0, W, topBarH);

            // Línea blanca bajo la franja
            const lineGrad = ctx.createLinearGradient(0, 0, W, 0);
            lineGrad.addColorStop(0, 'rgba(255,255,255,0.1)');
            lineGrad.addColorStop(0.5, 'rgba(255,255,255,0.6)');
            lineGrad.addColorStop(1, 'rgba(255,255,255,0.1)');
            ctx.fillStyle = lineGrad;
            ctx.fillRect(0, topBarH, W, 3);

            // ── PRENSA / PRESS ──
            ctx.fillStyle = '#ffffff';
            ctx.font = "bold 34px 'Oswald', sans-serif";
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.letterSpacing = '8px';
            ctx.fillText('PRENSA  /  PRESS', W / 2, topBarH / 2);
            ctx.letterSpacing = '0px';

            // ── Foto del empleado (proporción 3:4 tipo carnet) ──
            const photoX = 45;
            const photoY = 100;
            const photoW = 180;
            const photoH = 240; // 3:4 ratio
            const photoR = 12;

            // Sombra de la foto
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 20;
            ctx.shadowOffsetX = 4;
            ctx.shadowOffsetY = 4;
            roundedRect(ctx, photoX, photoY, photoW, photoH, photoR);
            ctx.fillStyle = '#000';
            ctx.fill();
            ctx.restore();

            // Marco blanco
            ctx.save();
            roundedRect(ctx, photoX - 3, photoY - 3, photoW + 6, photoH + 6, photoR + 2);
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.fill();
            ctx.restore();

            // Imagen recortada (crop center para proporción 3:4)
            ctx.save();
            roundedRect(ctx, photoX, photoY, photoW, photoH, photoR);
            ctx.clip();
            const targetRatio = photoW / photoH; // 3:4
            const imgRatio = uploadedPhoto.width / uploadedPhoto.height;
            let sx, sy, sw, sh;
            if (imgRatio > targetRatio) {
                // Imagen más ancha que 3:4 → recortar lados
                sh = uploadedPhoto.height;
                sw = sh * targetRatio;
                sx = (uploadedPhoto.width - sw) / 2;
                sy = 0;
            } else {
                // Imagen más alta que 3:4 → recortar arriba/abajo
                sw = uploadedPhoto.width;
                sh = sw / targetRatio;
                sx = 0;
                sy = (uploadedPhoto.height - sh) / 2;
            }
            ctx.drawImage(uploadedPhoto, sx, sy, sw, sh, photoX, photoY, photoW, photoH);
            ctx.restore();

            // ── Datos del empleado (2 columnas tipo DNI) ──
            const dataX = photoX + photoW + 40;
            const col2X = dataX + 230; // segunda columna
            let dataY = 105;

            // Nombre completo
            ctx.fillStyle = '#ffffff';
            ctx.font = "bold 30px 'Oswald', sans-serif";
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            const fullName = (data.nombre + ' ' + data.apellido).toUpperCase();
            ctx.fillText(fullName, dataX, dataY);
            dataY += 40;

            // Cargo
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = "500 17px 'Inter', sans-serif";
            ctx.fillText(data.cargo, dataX, dataY);
            dataY += 34;

            // Línea separadora
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fillRect(dataX, dataY, W - dataX - 45, 1);
            dataY += 18;

            // Helper para dibujar campo con label
            const drawField = (label, value, x, y) => {
                ctx.fillStyle = 'rgba(255,255,255,0.45)';
                ctx.font = "600 10px 'Inter', sans-serif";
                ctx.textAlign = 'left';
                ctx.fillText(label.toUpperCase(), x, y);
                ctx.fillStyle = '#ffffff';
                ctx.font = "500 15px 'Inter', sans-serif";
                ctx.fillText(value, x, y + 15);
            };

            // Fila 1: Nº Empleado | F. Nacimiento
            drawField('Nº Empleado', data.numero, dataX, dataY);
            drawField('F. Nacimiento', formatDateDisplay(data.nacimiento), col2X, dataY);
            dataY += 50;

            // Fila 2: Expedición | Expiración
            drawField('Expedición', formatDateDisplay(data.expedicion), dataX, dataY);
            drawField('Expiración', formatDateDisplay(data.expiracion), col2X, dataY);
            dataY += 50;

            // ── "LAS VENTURAS NEWS" debajo de la foto ──
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = "bold 13px 'Oswald', sans-serif";
            ctx.textAlign = 'center';
            ctx.letterSpacing = '4px';
            ctx.fillText('LAS VENTURAS NEWS', photoX + photoW / 2, photoY + photoH + 22);
            ctx.letterSpacing = '0px';

            // ── Logo (zona derecha, justo encima de la franja inferior) ──
            if (logoImg.complete && logoImg.naturalWidth > 0) {
                const logoSize = 90;
                const logoBottomBarY = H - 55; // botBarY
                const logoX = W - logoSize - 45;
                const logoY = logoBottomBarY - logoSize - 15;

                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(logoX + logoSize / 2, logoY + logoSize / 2, logoSize / 2, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(logoImg, logoX, logoY, logoSize, logoSize);
                ctx.restore();
            }

            // ── Franja inferior ──
            const botBarH = 55;
            const botBarY = H - botBarH;

            // Fondo de la franja inferior
            const botGrad = ctx.createLinearGradient(0, botBarY, 0, H);
            botGrad.addColorStop(0, 'rgba(0,0,0,0.35)');
            botGrad.addColorStop(1, 'rgba(0,0,0,0.6)');
            ctx.fillStyle = botGrad;
            ctx.fillRect(0, botBarY, W, botBarH);

            // Línea superior de la franja
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(0, botBarY, W, 1);

            // Nº Empleado grande en la franja inferior (centrado bajo el logo)
            const logoCenterX = W - 90 - 45 + 45; // logoX + logoSize/2
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.font = "bold 36px 'Oswald', sans-serif";
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('#' + data.numero, logoCenterX, botBarY + botBarH / 2);


            ctx.restore(); // Restaurar clip
        }

        // ── Utilidad: rectángulo con esquinas redondeadas ──
        function roundedRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // ── Logout ──
        document.getElementById('btn-logout').addEventListener('click', () => {
            Auth.logout();
            window.location.href = 'index.html';
        });
    </script>
