<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Usuario | Las Venturas News</title>
    <meta name="description" content="Panel de control de usuario de Las Venturas News.">
    <link rel="icon" href="../img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="login-bg min-h-screen flex flex-col">

        <!-- Partículas decorativas -->
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <!-- Header -->
        <header class="w-full border-b border-white/10 backdrop-blur-md bg-white/5 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
                <a href="../index.html" class="text-xl md:text-2xl font-bold tracking-tighter" style="font-family: 'Oswald', sans-serif;">
                    <span class="text-white">LAS VENTURAS </span><span class="text-red-500">NEWS</span>
                </a>
                <div class="flex items-center gap-4">
                    <a href="../index.html" class="text-slate-400 hover:text-white text-sm transition flex items-center gap-1.5" style="font-family: 'Inter', sans-serif;">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/>
                        </svg>
                        Inicio
                    </a>
                    <button id="btn-logout" class="text-red-400 hover:text-red-300 text-sm transition flex items-center gap-1.5 cursor-pointer" style="font-family: 'Inter', sans-serif;">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Cerrar sesión
                    </button>
                </div>
            </div>
        </header>

        <!-- Contenido principal -->
        <main class="flex-1 w-full max-w-6xl mx-auto px-4 py-10 md:py-14">

            <!-- Bienvenida -->
            <div class="fade-in mb-10 md:mb-14">
                <div class="flex items-center gap-5 mb-2">
                    <div class="avatar flex-shrink-0" id="user-avatar" style="width: 60px; height: 60px; font-size: 1.5rem;"></div>
                    <div>
                        <p class="text-slate-400 text-sm mb-1" style="font-family: 'Inter', sans-serif;">Bienvenido de nuevo</p>
                        <h1 id="user-name" class="text-2xl md:text-3xl font-bold text-white" style="font-family: 'Oswald', sans-serif;"></h1>
                    </div>
                </div>
            </div>

            <!-- Sección de herramientas -->
            <div class="fade-in-delay">
                <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-5" style="font-family: 'Inter', sans-serif;">
                    Herramientas
                </h2>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">

                    <!-- Generar Facturas -->
                    <a href="facturas.html" class="dash-card group flex flex-col items-start gap-4 p-6 hover:border-red-500/30 cursor-pointer no-underline">
                        <div class="w-12 h-12 rounded-xl bg-red-600/15 flex items-center justify-center group-hover:bg-red-600/25 transition">
                            <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                        </div>
                        <div>
                            <h3 class="text-white font-semibold text-base mb-1" style="font-family: 'Oswald', sans-serif; letter-spacing: 0.02em;">
                                GENERAR FACTURAS
                            </h3>
                            <p class="text-slate-500 text-sm" style="font-family: 'Inter', sans-serif;">
                                Crea y gestiona facturas para los servicios del canal.
                            </p>
                        </div>
                        <span class="text-red-400/60 text-xs flex items-center gap-1 mt-auto group-hover:text-red-400 transition" style="font-family: 'Inter', sans-serif;">
                            Abrir
                            <svg class="w-3.5 h-3.5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                        </span>
                    </a>

                    <!-- Placeholder para futuras herramientas (invisible, solo para mantener el grid) -->

                </div>
            </div>

        </main>
    </div>

    <script src="auth.js?v=1.0"></script>
    <script>
        Auth.protegerPagina();

        const usuario = Auth.getUsuario();

        if (usuario) {
            document.getElementById('user-avatar').textContent = usuario.nombre.charAt(0).toUpperCase();
            document.getElementById('user-name').textContent = usuario.nombre;
        }

        document.getElementById('btn-logout').addEventListener('click', () => {
            Auth.logout();
            window.location.href = 'index.html';
        });
    </script>
</body>

</html>
