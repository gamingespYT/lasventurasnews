<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Las Venturas News</title>
    <meta name="description" content="Accede al panel de Las Venturas News. Inicia sesión con tus credenciales.">
    <link rel="icon" href="../img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="login-bg flex items-center justify-center px-4 py-8">

        <!-- Partículas decorativas -->
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <!-- Card de Login -->
        <div class="login-card w-full max-w-md p-8 md:p-10 fade-in">

            <!-- Logo -->
            <div class="text-center mb-8">
                <a href="../index.html" class="inline-block">
                    <h1 class="text-3xl md:text-4xl font-bold tracking-tighter logo-glow" style="font-family: 'Oswald', sans-serif;">
                        <span class="text-white">LAS VENTURAS </span><span class="text-red-500">NEWS</span>
                    </h1>
                </a>
                <div class="red-line mt-4"></div>
                <p class="text-slate-400 mt-4 text-sm" style="font-family: 'Inter', sans-serif;">
                    Accede al panel de control
                </p>
            </div>

            <!-- Mensaje de error -->
            <div id="error-msg" class="error-msg mb-4">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                </svg>
                <span id="error-text"></span>
            </div>

            <!-- Formulario -->
            <form id="login-form" autocomplete="off">
                <!-- Usuario -->
                <div class="mb-5">
                    <label class="block text-slate-400 text-xs font-medium mb-2 uppercase tracking-wider" style="font-family: 'Inter', sans-serif;">
                        Usuario
                    </label>
                    <div class="input-wrapper">
                        <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        <input type="text" id="input-usuario" class="login-input" placeholder="Tu nombre de usuario" autocomplete="username" required>
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="mb-6">
                    <label class="block text-slate-400 text-xs font-medium mb-2 uppercase tracking-wider" style="font-family: 'Inter', sans-serif;">
                        Contraseña
                    </label>
                    <div class="input-wrapper">
                        <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                        <input type="password" id="input-password" class="login-input" placeholder="Tu contraseña" autocomplete="current-password" required>
                        <button type="button" id="toggle-password" class="toggle-password" tabindex="-1" aria-label="Mostrar contraseña">
                            <svg id="icon-eye" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <svg id="icon-eye-off" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Botón submit -->
                <button type="submit" id="btn-login" class="login-btn">
                    <span id="btn-text">INICIAR SESIÓN</span>
                    <span id="btn-spinner" class="spinner hidden"></span>
                </button>
            </form>

            <!-- Link a inicio -->
            <div class="text-center mt-6 fade-in-delay">
                <a href="../index.html" class="text-slate-500 hover:text-red-400 text-sm transition" style="font-family: 'Inter', sans-serif;">
                    ← Volver al inicio
                </a>
            </div>
        </div>
    </div>

    <script src="auth.js?v=1.0"></script>
    <script>
        // Si ya está logueado, redirigir al dashboard
        Auth.redirigirSiLogueado();

        const form = document.getElementById('login-form');
        const inputUsuario = document.getElementById('input-usuario');
        const inputPassword = document.getElementById('input-password');
        const errorMsg = document.getElementById('error-msg');
        const errorText = document.getElementById('error-text');
        const btnLogin = document.getElementById('btn-login');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const togglePassword = document.getElementById('toggle-password');
        const iconEye = document.getElementById('icon-eye');
        const iconEyeOff = document.getElementById('icon-eye-off');
        const loginCard = document.querySelector('.login-card');

        // Toggle mostrar/ocultar contraseña
        togglePassword.addEventListener('click', () => {
            const isPassword = inputPassword.type === 'password';
            inputPassword.type = isPassword ? 'text' : 'password';
            iconEye.classList.toggle('hidden', !isPassword);
            iconEyeOff.classList.toggle('hidden', isPassword);
        });

        // Ocultar error al escribir
        [inputUsuario, inputPassword].forEach(input => {
            input.addEventListener('input', () => {
                errorMsg.classList.remove('visible');
            });
        });

        // Submit del formulario
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const usuario = inputUsuario.value.trim();
            const password = inputPassword.value;

            // Mostrar loading
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');
            btnLogin.disabled = true;

            // Simular pequeño delay para feedback visual
            setTimeout(() => {
                const result = Auth.login(usuario, password);

                if (result.success) {
                    // Login exitoso — redirigir
                    loginCard.style.transform = 'scale(0.95)';
                    loginCard.style.opacity = '0';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 300);
                } else {
                    // Error
                    errorText.textContent = result.error;
                    errorMsg.classList.add('visible');
                    loginCard.classList.add('shake');
                    setTimeout(() => loginCard.classList.remove('shake'), 500);

                    // Restaurar botón
                    btnText.classList.remove('hidden');
                    btnSpinner.classList.add('hidden');
                    btnLogin.disabled = false;
                }
            }, 600);
        });
    </script>
</body>

</html>
